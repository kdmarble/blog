{{- /* Giscus comments — rendered on article pages when params.article.showComments is true.
     Configure at https://giscus.app after enabling Discussions on the GitHub repo,
     then replace data-repo-id and data-category-id below. */ -}}
<script src="https://giscus.app/client.js"
        data-repo="kdmarble/blog"
        data-repo-id="REPLACE_ME_AFTER_GISCUS_CONFIG"
        data-category="Announcements"
        data-category-id="REPLACE_ME_AFTER_GISCUS_CONFIG"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantization: Symmetric vs Asymmetric</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>p5.disableFriendlyErrors = true;</script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a1a; }
    body { min-height: 100vh; display: grid; place-items: center; }
    canvas { display: block; max-width: 100vw; max-height: 100vh; width: auto !important; height: auto !important; }
  </style>
</head>
<body>
<script>
const CONFIG = {
  seed: 42,
  // Simulated BF16 weight values
  weights: [0.91, 1.31, 6.34, 3.32, 5.40, 4.12, 2.87, 0.45, 5.91, 1.78,
            3.56, 6.12, 0.78, 4.89, 2.34, 5.67, 1.23, 6.50, 3.01, 0.33],
  int4Range: [-8, 7],  // int4 signed range
};

let animatedWeights = [];
let targetWeights = [];
let quantized = [];
let phase = 0; // 0=show raw, 1=show symmetric, 2=show asymmetric
let phaseTimer = 0;
let errorDisplay = [];

function setup() {
  createCanvas(1200, 700);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(HSB, 360, 100, 100, 100);

  targetWeights = [...CONFIG.weights];
  animatedWeights = CONFIG.weights.map(() => 0);
  phase = 0;
  phaseTimer = 0;
}

function draw() {
  // Background
  for (let y = 0; y < height; y++) {
    let inter = map(y, 0, height, 0, 1);
    let c = lerpColor(color(240, 30, 8), color(240, 40, 4), inter);
    stroke(c);
    line(0, y, width, 0, width, y);
  }

  phaseTimer += deltaTime / 1000;
  if (phaseTimer > 4) {
    phase = (phase + 1) % 3;
    phaseTimer = 0;
  }

  // Animate weights appearing
  for (let i = 0; i < animatedWeights.length; i++) {
    animatedWeights[i] = lerp(animatedWeights[i], targetWeights[i], 0.05);
  }

  // Draw title
  drawTitle();

  // Draw phase-specific content
  if (phase === 0) drawRawWeights();
  else if (phase === 1) drawSymmetricQuant();
  else drawAsymmetricQuant();

  // Draw error bars
  drawErrorBars();
}

function drawTitle() {
  push();
  textSize(22);
  textStyle(BOLD);
  textAlign(CENTER, TOP);

  let titles = ['BF16 Weights (Original)', 'Symmetric Quantization', 'Asymmetric Quantization'];
  let colors = [
    color(200, 80, 85),
    color(120, 80, 85),
    color(280, 80, 85),
  ];

  fill(colors[phase]);
  noStroke();
  text(titles[phase], width/2, 20);

  let descs = [
    '32-bit floating point — full precision, 15GB for a typical model',
    'Single scale factor for entire group — fast but loses detail',
    'Separate min/max scale — preserves outliers better',
  ];

  textSize(13);
  textStyle(NORMAL);
  fill(0, 0, 65);
  text(descs[phase], width/2, 50);
  pop();
}

function drawRawWeights() {
  push();
  textSize(14);
  textStyle(BOLD);
  textAlign(CENTER, TOP);
  fill(0, 0, 90);
  text('Original BF16 Values (20 weights)', width/2, 80);

  let barWidth = 40;
  let startX = 100;
  let maxVal = 7;

  for (let i = 0; i < targetWeights.length; i++) {
    let x = startX + i * 55;
    let h = map(animatedWeights[i], 0, maxVal, 0, 200);
    let y = 500 - h;

    let c = color(200 + map(animatedWeights[i], 0, maxVal, 0, 30), 70, 80);
    fill(c);
    noStroke();
    rect(x, y, barWidth, h, 3);

    // Value label
    textSize(10);
    textStyle(NORMAL);
    fill(0, 0, 90);
    text(animatedWeights[i].toFixed(2), x + barWidth/2, y - 15);
  }
  pop();
}

function drawSymmetricQuant() {
  push();
  textSize(14);
  textStyle(BOLD);
  textAlign(CENTER, TOP);
  fill(0, 0, 90);
  text('Symmetric: Scale based on max absolute value', width/2, 80);

  // Find range (symmetric uses max of abs values)
  let maxAbs = 0;
  for (let w of targetWeights) {
    maxAbs = max(maxAbs, abs(w));
  }
  let scale = maxAbs / CONFIG.int4Range[1]; // 6.50 / 7 ≈ 0.929

  let barWidth = 40;
  let startX = 100;

  for (let i = 0; i < targetWeights.length; i++) {
    let x = startX + i * 55;
    let raw = animatedWeights[i];
    let quantized = round(raw / scale);
    quantized = constrain(quantized, CONFIG.int4Range[0], CONFIG.int4Range[1]);
    let dequantized = quantized * scale;

    let h = map(abs(dequantized), 0, CONFIG.int4Range[1], 0, 200);
    let y = 500 - h;

    // Color based on quantized value
    let c = color(120 + map(quantized, -8, 7, 0, 60), 70, 80);
    fill(c);
    noStroke();
    rect(x, y, barWidth, h, 3);

    // Show quantized value
    textSize(10);
    textStyle(NORMAL);
    fill(0, 0, 90);
    text(`q=${quantized}`, x + barWidth/2, y - 15);

    // Show dequantized error
    let error = abs(raw - dequantized);
    if (error > 0.1) {
      fill(0, 90, 90);
      textSize(9);
      text(`±${error.toFixed(2)}`, x + barWidth/2, y - 28);
    }
  }

  // Show scale factor
  textSize(12);
  textStyle(BOLD);
  fill(120, 80, 85);
  text(`Scale factor: ${scale.toFixed(4)} (max/${CONFIG.int4Range[1]})`, width/2, 540);
  pop();
}

function drawAsymmetricQuant() {
  push();
  textSize(14);
  textStyle(BOLD);
  textAlign(CENTER, TOP);
  fill(0, 0, 90);
  text('Asymmetric: Separate min and max scales', width/2, 80);

  // Find range (asymmetric uses actual min/max)
  let minVal = Infinity, maxVal = -Infinity;
  for (let w of targetWeights) {
    minVal = min(minVal, w);
    maxVal = max(maxVal, w);
  }
  let range = maxVal - minVal;
  let int4Range = CONFIG.int4Range[1] - CONFIG.int4Range[0]; // 7 - (-8) = 15
  let scale = range / int4Range; // (6.50 - 0.33) / 15 ≈ 0.411

  let barWidth = 40;
  let startX = 100;

  for (let i = 0; i < targetWeights.length; i++) {
    let x = startX + i * 55;
    let raw = animatedWeights[i];
    let quantized = round((raw - minVal) / scale) + CONFIG.int4Range[0];
    quantized = constrain(quantized, CONFIG.int4Range[0], CONFIG.int4Range[1]);
    let dequantized = quantized * scale + minVal;

    let h = map(abs(dequantized), 0, CONFIG.int4Range[1], 0, 200);
    let y = 500 - h;

    // Color based on quantized value
    let c = color(280 + map(quantized, -8, 7, 0, 60), 70, 80);
    fill(c);
    noStroke();
    rect(x, y, barWidth, h, 3);

    // Show quantized value
    textSize(10);
    textStyle(NORMAL);
    fill(0, 0, 90);
    text(`q=${quantized}`, x + barWidth/2, y - 15);

    // Show dequantized error
    let error = abs(raw - dequantized);
    if (error > 0.1) {
      fill(0, 90, 90);
      textSize(9);
      text(`±${error.toFixed(2)}`, x + barWidth/2, y - 28);
    }
  }

  // Show scale and offset
  textSize(12);
  textStyle(BOLD);
  fill(280, 80, 85);
  text(`Scale: ${scale.toFixed(4)} | Offset: ${minVal.toFixed(2)}`, width/2, 540);
  pop();
}

function drawErrorBars() {
  push();
  textSize(12);
  textStyle(BOLD);
  textAlign(CENTER, BOTTOM);

  if (phase > 0) {
    // Calculate total error
    let totalError = 0;
    let count = 0;

    if (phase === 1) {
      let maxAbs = 0;
      for (let w of targetWeights) maxAbs = max(maxAbs, abs(w));
      let scale = maxAbs / CONFIG.int4Range[1];
      for (let w of targetWeights) {
        let q = constrain(round(w / scale), CONFIG.int4Range[0], CONFIG.int4Range[1]);
        totalError += abs(w - q * scale);
        count++;
      }
    } else {
      let minVal = Infinity, maxVal = -Infinity;
      for (let w of targetWeights) { minVal = min(minVal, w); maxVal = max(maxVal, w); }
      let range = maxVal - minVal;
      let int4Range = CONFIG.int4Range[1] - CONFIG.int4Range[0];
      let scale = range / int4Range;
      for (let w of targetWeights) {
        let q = constrain(round((w - minVal) / scale) + CONFIG.int4Range[0], CONFIG.int4Range[0], CONFIG.int4Range[1]);
        totalError += abs(w - (q * scale + minVal));
        count++;
      }
    }

    let avgError = count > 0 ? totalError / count : 0;
    fill(0, 0, 90);
    text(`Average quantization error: ${avgError.toFixed(4)}`, width/2, height - 15);
  }
  pop();
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('quantization-comparison', 'png');
  if (key === 'r' || key === 'R') { randomSeed(millis()); noiseSeed(millis()); }
  if (key === ' ') phase = (phase + 1) % 3;
}
</script>
</body>
</html>

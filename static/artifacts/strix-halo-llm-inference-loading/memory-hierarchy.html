<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Memory Hierarchy — Lazy Loading</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>p5.disableFriendlyErrors = true;</script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a1a; }
    body { min-height: 100vh; display: grid; place-items: center; }
    canvas { display: block; max-width: 100vw; max-height: 100vh; width: auto !important; height: auto !important; }
  </style>
</head>
<body>
<script>
const CONFIG = {
  seed: 42,
  layers: [
    { name: 'SSD', y: 0, color: [200, 80, 60], speed: 1, capacity: 100, loaded: 0 },
    { name: 'RAM', y: 1, color: [60, 120, 200], speed: 3, capacity: 50, loaded: 0 },
    { name: 'GPU', y: 2, color: [60, 200, 100], speed: 10, capacity: 20, loaded: 0 },
  ],
  transferSpeeds: [
    { from: 0, to: 1, speed: 2 },   // SSD→RAM: PCIe ~7GB/s
    { from: 1, to: 2, speed: 8 },   // RAM→GPU: PCIe ~16GB/s
  ],
  batchSize: 3,
};

let blocks = [];
let particles = [];
let phase = 0; // 0=eager, 1=lazy
let phaseTimer = 0;
let labels = [];

function setup() {
  createCanvas(1200, 700);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(HSB, 360, 100, 100, 100);

  // Create weight blocks in SSD
  for (let i = 0; i < CONFIG.layers[0].capacity; i++) {
    blocks.push({
      id: i,
      layer: 0,
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      size: 18,
      loaded: false,
      inTransit: false,
      transitProgress: 0,
      fromLayer: 0,
      toLayer: 0,
      hue: map(i, 0, CONFIG.layers[0].capacity, 0, 30),
    });
  }

  // Position blocks in SSD
  let cols = 10;
  for (let i = 0; i < blocks.length; i++) {
    let col = i % cols;
    let row = floor(i / cols);
    blocks[i].x = 200 + col * 40;
    blocks[i].y = CONFIG.layers[0].y * 180 + 30 + row * 25;
    blocks[i].targetX = blocks[i].x;
    blocks[i].targetY = blocks[i].y;
  }

  phase = 0;
  phaseTimer = 0;
}

function draw() {
  // Background with subtle gradient
  for (let y = 0; y < height; y++) {
    let inter = map(y, 0, height, 0, 1);
    let c = lerpColor(color(240, 30, 8), color(240, 40, 4), inter);
    stroke(c);
    line(0, y, width, y);
  }

  phaseTimer += deltaTime / 1000;
  if (phaseTimer > 5) {
    phase = 1 - phase;
    phaseTimer = 0;
    resetForPhase();
  }

  // Draw layer labels
  drawLayerLabels();

  // Draw layer backgrounds
  drawLayerBackgrounds();

  // Update and draw blocks
  updateBlocks();
  drawBlocks();

  // Draw transfer particles
  updateParticles();
  drawParticles();

  // Draw phase indicator
  drawPhaseIndicator();

  // Draw legend
  drawLegend();
}

function resetForPhase() {
  for (let b of blocks) {
    b.layer = 0;
    b.loaded = false;
    b.inTransit = false;
    b.transitProgress = 0;
    b.x = 200 + (b.id % 10) * 40;
    b.y = CONFIG.layers[0].y * 180 + 30 + floor(b.id / 10) * 25;
  }
  blocks[0].layer = 0;
  blocks[0].loaded = true;
  blocks[0].inTransit = true;
  blocks[0].transitProgress = 0;
  blocks[0].fromLayer = 0;
  blocks[0].toLayer = 1;
}

function drawLayerLabels() {
  push();
  textSize(18);
  textStyle(BOLD);
  textAlign(LEFT, CENTER);

  for (let i = 0; i < CONFIG.layers.length; i++) {
    let layer = CONFIG.layers[i];
    let y = layer.y * 180 + 90;
    fill(0, 0, 95);
    noStroke();
    text(layer.name, 30, y);
  }
  pop();
}

function drawLayerBackgrounds() {
  for (let i = 0; i < CONFIG.layers.length; i++) {
    let layer = CONFIG.layers[i];
    let c = color(layer.color[0], layer.color[1], layer.color[2], 15);
    fill(c);
    noStroke();
    rect(150, i * 180 - 30, 900, 170, 8);
  }
}

function updateBlocks() {
  for (let b of blocks) {
    // Smooth movement
    b.x = lerp(b.x, b.targetX, 0.08);
    b.y = lerp(b.y, b.targetY, 0.08);

    // Handle transit
    if (b.inTransit) {
      b.transitProgress += 0.015;
      if (b.transitProgress >= 1) {
        b.inTransit = false;
        b.transitProgress = 0;
        b.layer = b.toLayer;
        b.loaded = true;

        // Position in target layer
        let cols = 10;
        let col = b.id % cols;
        let row = floor(b.id / cols);
        b.targetX = 200 + col * 40;
        b.targetY = CONFIG.layers[b.toLayer].y * 180 + 30 + row * 25;

        // Trigger next block in transit (lazy loading simulation)
        if (phase === 1) {
          triggerNextLazy(b);
        }
      } else {
        // Interpolate position during transit
        let fromY = CONFIG.layers[b.fromLayer].y * 180 + 90;
        let toY = CONFIG.layers[b.toLayer].y * 180 + 90;
        b.y = lerp(fromY, toY, b.transitProgress);
        b.x = lerp(b.x, 600, b.transitProgress); // Move to center during transit
      }
    }
  }

  // Eager loading: load first batch quickly
  if (phase === 0) {
    loadNextEager();
  }
}

function triggerNextLazy(currentBlock) {
  // Find next unloaded block
  for (let b of blocks) {
    if (!b.loaded && !b.inTransit && b.id > currentBlock.id) {
      b.inTransit = true;
      b.transitProgress = 0;
      b.fromLayer = 0;
      b.toLayer = 1;
      break;
    }
  }
}

function loadNextEager() {
  // Load first 8 blocks eagerly
  if (blocks[0].loaded && blocks[0].layer >= 1 && !blocks[1].inTransit) {
    blocks[1].inTransit = true;
    blocks[1].transitProgress = 0;
    blocks[1].fromLayer = 0;
    blocks[1].toLayer = 1;
  }
  if (blocks[1].loaded && blocks[1].layer >= 1 && !blocks[2].inTransit) {
    blocks[2].inTransit = true;
    blocks[2].transitProgress = 0;
    blocks[2].fromLayer = 0;
    blocks[2].toLayer = 1;
  }
  if (blocks[2].loaded && blocks[2].layer >= 1 && !blocks[3].inTransit) {
    blocks[3].inTransit = true;
    blocks[3].transitProgress = 0;
    blocks[3].fromLayer = 0;
    blocks[3].toLayer = 1;
  }
}

function drawBlocks() {
  for (let b of blocks) {
    if (b.layer < 0) continue;

    let c = color(220 + b.hue, 70, 85, b.loaded ? 90 : 40);
    fill(c);

    if (b.inTransit) {
      // Glow effect for in-transit blocks
      noStroke();
      fill(220 + b.hue, 90, 95, 30);
      ellipse(b.x, b.y, b.size + 12, b.size + 12);
      fill(220 + b.hue, 70, 85, 90);
    } else if (b.loaded) {
      stroke(0, 0, 100, 60);
      strokeWeight(1);
    } else {
      noStroke();
    }

    rect(b.x - b.size/2, b.y - b.size/2, b.size, b.size, 3);
  }
}

function updateParticles() {
  // Spawn particles for in-transit blocks
  for (let b of blocks) {
    if (b.inTransit && random() < 0.3) {
      particles.push({
        x: b.x,
        y: b.y,
        vx: random(-1, 1),
        vy: random(-0.5, 0.5),
        life: 1,
        hue: b.hue,
      });
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (let p of particles) {
    noStroke();
    fill(220 + p.hue, 80, 90, p.life * 60);
    ellipse(p.x, p.y, 4, 4);
  }
}

function drawPhaseIndicator() {
  push();
  textSize(24);
  textStyle(BOLD);
  textAlign(CENTER, TOP);

  let phaseText = phase === 0 ? 'EAGER LOADING' : 'LAZY LOADING (mMAP)';
  let phaseColor = phase === 0 ? color(200, 80, 85) : color(120, 80, 85);

  fill(phaseColor);
  noStroke();
  text(phaseText, width/2, 20);

  let desc = phase === 0
    ? 'Load all weights into RAM at once — simple but memory-intensive'
    : 'Load weights on-demand via OS memory mapping — efficient but with page fault latency';

  textSize(14);
  textStyle(NORMAL);
  fill(0, 0, 70);
  text(desc, width/2, 52);
  pop();
}

function drawLegend() {
  push();
  textSize(12);
  textAlign(LEFT, TOP);

  let x = 20;
  let y = height - 60;

  fill(0, 0, 90);
  text('SSD (15GB model weights)', x, y);
  fill(200, 80, 85);
  rect(x + 10, y + 15, 12, 12);

  fill(0, 0, 90);
  text('RAM (32GB system memory)', x, y + 30);
  fill(60, 80, 85);
  rect(x + 10, y + 45, 12, 12);

  fill(0, 0, 90);
  text('GPU (compute accelerator)', x + 200, y);
  fill(60, 80, 85);
  rect(x + 210, y + 15, 12, 12);

  fill(0, 0, 90);
  text('In-transit weight block', x + 200, y + 30);
  noStroke();
  fill(220, 70, 85, 90);
  rect(x + 210, y + 45, 12, 12);

  pop();
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('memory-hierarchy', 'png');
  if (key === 'r' || key === 'R') { randomSeed(millis()); noiseSeed(millis()); }
  if (key === ' ') phase = 1 - phase;
}
</script>
</body>
</html>
